<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SpaceDock</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'Courier New', monospace;
            padding: 32px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #58a6ff;
        }

        p {
            color: #8b949e;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        input {
            flex: 1;
            background: #161b22;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #2ea043;
        }

        #status {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 12px;
            min-height: 20px;
        }

        #log-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            height: 500px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            color: #e6edf3;
            white-space: pre-wrap;
        }

        .log-line.success {
            color: #3fb950;
        }

        .log-line.error {
            color: #f85149;
        }

        .log-line.info {
            color: #58a6ff;
        }

        #live-url {
            margin-top: 16px;
            font-size: 14px;
        }

        #live-url a {
            color: #3fb950;
            text-decoration: none;
        }

        #live-url a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>SpaceDock</h1>
    <p>Paste a GitHub URL and click Deploy. Logs stream in real time.</p>

    <div class="row">
        <input id="repo-url" type="text" placeholder="https://github.com/your-username/your-repo" />
        <button onclick="deploy()">Deploy</button>
    </div>

    <div id="status">Waiting for deployment...</div>
    <div id="log-container"></div>
    <div id="live-url"></div>

    <script>
        let stompClient = null;

        // Connect to SpaceDock's WebSocket on page load
        function connect() {
            const socket = new SockJS('http://localhost:8082/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null; // silence debug noise
            stompClient.connect({}, () => {
                appendLog('🔗 Connected to SpaceDock', 'info');
            });
        }

        function deploy() {
            const repoUrl = document.getElementById('repo-url').value.trim();
            if (!repoUrl) return;

            clearLogs();
            document.getElementById('status').textContent = 'Connecting...';

            // Step 1 — get a deployment ID first without starting the pipeline
            fetch('http://localhost:8082/api/deployments/prepare', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ repoUrl })
            })
                .then(res => res.text())
                .then(deploymentId => {
                    document.getElementById('status').textContent =
                        'Deployment ID: ' + deploymentId;

                    // Step 2 — subscribe FIRST
                    subscribeToLogs(deploymentId);

                    // Step 3 — small delay to ensure subscription is registered,
                    // then trigger the actual pipeline
                    setTimeout(() => {
                        fetch('http://localhost:8082/api/deployments/start/' + deploymentId, {
                            method: 'POST'
                        });
                    }, 500);
                });
        }

        function subscribeToLogs(deploymentId) {
            if (!stompClient || !stompClient.connected) {
                appendLog('❌ WebSocket not connected', 'error');
                return;
            }

            const topic = `/topic/logs/${deploymentId}`;
            appendLog(`📡 Subscribing to ${topic}`, 'info');

            stompClient.subscribe(topic, (message) => {
                const line = message.body;
                if (line.startsWith('❌') || line.toLowerCase().includes('error')) {
                    appendLog(line, 'error');
                } else if (line.startsWith('✅') || line.startsWith('🌍')) {
                    appendLog(line, 'success');
                    if (line.startsWith('🌍')) {
                        const urlMatch = line.match(/http:\/\/\S+/);
                        if (urlMatch) {
                            const url = urlMatch[0];
                            document.getElementById('live-url').innerHTML =
                                `Your app is live: <a href="${url}" target="_blank">${url}</a>`;
                        }
                    }
                } else {
                    appendLog(line, '');
                }
            });
        }

        function appendLog(line, type) {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = 'log-line ' + (type || '');
            div.textContent = line;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight; // auto-scroll
        }

        function clearLogs() {
            document.getElementById('log-container').innerHTML = '';
        }

        // Connect as soon as the page loads
        connect();
    </script>
</body>

</html>
