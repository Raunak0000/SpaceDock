version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: spacedock-db
    environment:
      POSTGRES_DB: spacedock
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - spacedock-data:/var/lib/postgresql/data

  caddy:
    image: caddy:2-alpine
    container_name: spacedock-caddy
    ports:
      - "80:80"
      - "2019:2019"
    volumes:
      - caddy-data:/data
      - ./Caddyfile:/etc/caddy/Caddyfile

volumes:
  spacedock-data:
  caddy-data:
